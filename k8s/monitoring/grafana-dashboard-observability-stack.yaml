apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-observability-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: flashcards
data:
  observability-stack.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "green",
                    "value": 3
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(max_over_time(up{job=~\"$stack_jobs\"}[5m]))",
              "legendFormat": "targets up",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Stack Targets Up",
          "type": "stat"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(loki_distributor_bytes_received_total[5m]))",
              "legendFormat": "bytes/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Loki Ingestion",
          "type": "stat"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(promtail_read_lines_total[5m]))",
              "legendFormat": "lines/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Promtail Read Rate",
          "type": "stat"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(logentry_dropped_lines_total[5m]))",
              "legendFormat": "dropped/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Dropped Log Lines",
          "type": "stat"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (job) (max_over_time(up{job=~\"$stack_jobs\"}[5m]))",
              "legendFormat": "{{job}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Component Health by Job",
          "type": "timeseries"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "prometheus_tsdb_head_series",
              "legendFormat": "prometheus series",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "grafana_stat_totals_dashboards",
              "legendFormat": "grafana dashboards",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "Prometheus and Grafana Internals",
          "type": "timeseries"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "id": 7,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (job) (rate(promtail_read_lines_total[5m]))",
              "legendFormat": "{{job}} read",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum by (job) (rate(promtail_sent_entries_total[5m]))",
              "legendFormat": "{{job}} sent",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "Promtail Pipeline Throughput",
          "type": "timeseries"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "id": 8,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(promtail_request_duration_seconds_bucket[5m])))",
              "legendFormat": "promtail push p95",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(loki_request_duration_seconds_bucket[5m])))",
              "legendFormat": "loki request p95",
              "range": true,
              "refId": "B"
            },
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(grafana_http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "grafana request p95",
              "range": true,
              "refId": "C"
            }
          ],
          "title": "Control Plane Latency",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "observability",
        "prometheus",
        "loki",
        "promtail"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "label": "Prometheus",
            "name": "prometheus_ds",
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": {
              "selected": true,
              "text": ".*(grafana|loki|promtail|prometheus).*",
              "value": ".*(grafana|loki|promtail|prometheus).*"
            },
            "label": "Job regex",
            "name": "stack_jobs",
            "options": [
              {
                "selected": true,
                "text": ".*(grafana|loki|promtail|prometheus).*",
                "value": ".*(grafana|loki|promtail|prometheus).*"
              }
            ],
            "query": ".*(grafana|loki|promtail|prometheus).*",
            "type": "textbox"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "",
      "title": "Observability Stack Overview",
      "uid": "observability-stack-overview",
      "version": 2,
      "weekStart": ""
    }
