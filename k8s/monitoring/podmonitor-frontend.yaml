apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: frontend
  labels:
    app.kubernetes.io/part-of: flashcards
spec:
  namespaceSelector:
    matchNames:
      - moomento
  selector:
    matchLabels:
      app: frontend
  podMetricsEndpoints:
    - path: /metrics
      targetPort: 3000
      interval: 30s
      scrapeTimeout: 10s
