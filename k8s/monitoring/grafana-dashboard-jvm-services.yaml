apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-jvm-services
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: flashcards
data:
  jvm-services.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 8,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "avg(process_cpu_usage{namespace=\"$namespace\", pod=~\"$service.*\"})",
              "legendFormat": "CPU",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Process CPU",
          "type": "stat"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(jvm_memory_used_bytes{namespace=\"$namespace\", pod=~\"$service.*\", area=\"heap\"})",
              "legendFormat": "Heap used",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Heap Used",
          "type": "stat"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(jvm_gc_pause_seconds_count{namespace=\"$namespace\", pod=~\"$service.*\"}[5m]))",
              "legendFormat": "GC events/s",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "GC Activity",
          "type": "stat"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "id": 4,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (pod) (jvm_memory_used_bytes{namespace=\"$namespace\", pod=~\"$service.*\", area=\"heap\"})",
              "legendFormat": "{{pod}} heap used",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum by (pod) (jvm_memory_max_bytes{namespace=\"$namespace\", pod=~\"$service.*\", area=\"heap\"})",
              "legendFormat": "{{pod}} heap max",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "Heap Utilization",
          "type": "timeseries"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "histogram_quantile(0.95, sum by (le, uri) (rate(http_server_requests_seconds_bucket{namespace=\"$namespace\", pod=~\"$service.*\", uri!~\"/actuator.*\"}[5m])))",
              "legendFormat": "{{uri}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "p95 Latency by URI",
          "type": "timeseries"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (state, pod) (jvm_threads_states_threads{namespace=\"$namespace\", pod=~\"$service.*\"})",
              "legendFormat": "{{pod}} {{state}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Thread States",
          "type": "timeseries"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "id": 7,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (status) (rate(http_server_requests_seconds_count{namespace=\"$namespace\", pod=~\"$service.*\"}[5m]))",
              "legendFormat": "{{status}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "HTTP Status Rate",
          "type": "timeseries"
        },
        {
          "datasource": "${prometheus_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 20
          },
          "id": 8,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (pool, pod) (hikaricp_connections_active{namespace=\"$namespace\", pod=~\"$service.*\"})",
              "legendFormat": "{{pod}} {{pool}} active",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum by (pool, pod) (hikaricp_connections_pending{namespace=\"$namespace\", pod=~\"$service.*\"})",
              "legendFormat": "{{pod}} {{pool}} pending",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "Datasource Pool",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "flashcards",
        "jvm",
        "spring"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "label": "Prometheus",
            "name": "prometheus_ds",
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": {
              "selected": true,
              "text": "moomento",
              "value": "moomento"
            },
            "label": "Namespace",
            "name": "namespace",
            "options": [
              {
                "selected": true,
                "text": "moomento",
                "value": "moomento"
              }
            ],
            "query": "moomento",
            "type": "textbox"
          },
          {
            "current": {
              "selected": true,
              "text": "backend|hosted",
              "value": "backend|hosted"
            },
            "label": "Service regex",
            "name": "service",
            "options": [
              {
                "selected": true,
                "text": "backend|hosted",
                "value": "backend|hosted"
              }
            ],
            "query": "backend|hosted",
            "type": "textbox"
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "",
      "title": "FlashCards JVM Services",
      "uid": "flashcards-jvm-services",
      "version": 1,
      "weekStart": ""
    }
