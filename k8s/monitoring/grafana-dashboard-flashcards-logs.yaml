apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-flashcards-logs
  annotations:
    grafana_folder: "Dashboards/flashcards"
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: flashcards
data:
  flashcards-logs.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "${loki_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 8,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(count_over_time({app=~\"$app\"}[5m]))",
              "legendFormat": "lines / 5m",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Total Log Volume",
          "description": "Total number of log lines seen in Loki for the selected FlashCards apps.",
          "type": "stat"
        },
        {
          "datasource": "${loki_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(count_over_time({app=~\"$app\", level=~\"ERROR|error\"}[5m]))",
              "legendFormat": "errors / 5m",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Error Volume",
          "description": "Recent error-level log volume for the selected applications.",
          "type": "stat"
        },
        {
          "datasource": "${loki_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(count_over_time({app=~\"$app\", level=~\"WARN|warn\"}[5m]))",
              "legendFormat": "warn / 5m",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Warning Volume",
          "description": "Recent warning-level log volume for the selected applications.",
          "type": "stat"
        },
        {
          "datasource": "${loki_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "id": 4,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (app) (count_over_time({app=~\"$app\"}[5m]))",
              "legendFormat": "{{app}}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Log Rate by App",
          "description": "Compares log throughput between FlashCards components.",
          "type": "timeseries"
        },
        {
          "datasource": "${loki_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "id": 5,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (level) (count_over_time({app=~\"$app\", level=~\"$level\"}[5m]))",
              "legendFormat": "{{level}}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Log Rate by Level",
          "description": "Shows how the selected logs split by severity level over time.",
          "type": "timeseries"
        },
        {
          "datasource": "${loki_ds}",
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 13
          },
          "id": 6,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "{app=~\"$app\", level=~\"$level\"} |= \"$contains\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Filtered Logs",
          "description": "Interactive log view filtered by app, log level, and free-text search.",
          "type": "logs"
        },
        {
          "datasource": "${loki_ds}",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 25
          },
          "id": 7,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (path) (count_over_time({app=\"frontend\"} | json | __error__=\"\" | path!=\"\" [5m]))",
              "legendFormat": "{{path}}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Frontend Problem Reports by Path",
          "description": "Counts structured frontend problem reports grouped by page path.",
          "type": "timeseries"
        },
        {
          "datasource": "${loki_ds}",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 25
          },
          "id": 8,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "{app=\"frontend\"} | json | __error__=\"\" | path=~\"$frontend_path\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Frontend Problem Reports",
          "description": "Detailed stream of structured frontend problem reports from Loki.",
          "type": "logs"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "flashcards",
        "logs",
        "loki"
      ],
      "templating": {
        "list": [
          {
