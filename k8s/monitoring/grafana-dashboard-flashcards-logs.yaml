            "options": [
              {
                "selected": true,
                "text": "FlashCardsBackend|FlashCardsHostedServices|frontend",
                "value": "FlashCardsBackend|FlashCardsHostedServices|frontend"
              }
            ],
            "query": "FlashCardsBackend|FlashCardsHostedServices|frontend",
            "type": "textbox"
          },
          {
            "current": {
              "selected": true,
              "text": ".*",
              "value": ".*"
            },
            "label": "Level regex",
            "name": "level",
            "options": [
              {
                "selected": true,
                "text": ".*",
                "value": ".*"
              }
            ],
            "query": ".*",
            "type": "textbox"
          },
          {
            "current": {
              "selected": true,
              "text": "",
              "value": ""
            },
            "label": "Contains",
            "name": "contains",
            "options": [
              {
                "selected": true,
                "text": "",
                "value": ""
              }
            ],
            "query": "",
            "type": "textbox"
          },
          {
            "current": {
              "selected": true,
              "text": ".*",
              "value": ".*"
            },
            "label": "Frontend path",
            "name": "frontend_path",
            "options": [
              {
                "selected": true,
                "text": ".*",
                "value": ".*"
              }
            ],
            "query": ".*",
            "type": "textbox"
          }
        ]
      },
      "time": {
        "from": "now-2h",
        "to": "now"
      },
      "timezone": "",
      "title": "FlashCards Logs",
      "description": "Log-centric dashboard for incident investigation and frontend problem report analysis.",
      "uid": "flashcards-logs",
      "version": 1,
      "weekStart": ""
    }
