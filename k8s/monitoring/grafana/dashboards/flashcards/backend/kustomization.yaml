apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: flashcards
    app.kubernetes.io/component: grafana-dashboards
    flashcards.moomento.pl/dashboard-group: backend
  annotations:
    grafana_folder: /tmp/dashboards/flashcards/backend

configMapGenerator:
  - name: flashcards-backend-health-dashboard
    files:
      - backend-health-dashboard.json
  - name: flashcards-backend-logs-dashboard
    files:
      - backend-logs-dashboard.json
  - name: flashcards-backend-api-quality-dashboard
    files:
      - backend-api-quality-dashboard.json
  - name: flashcards-backend-auth-security-dashboard
    files:
      - auth-security-dashboard.json
