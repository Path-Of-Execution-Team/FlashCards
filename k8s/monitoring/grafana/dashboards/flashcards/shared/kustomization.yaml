apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: flashcards
    app.kubernetes.io/component: grafana-dashboards
    flashcards.moomento.pl/dashboard-group: shared
  annotations:
    grafana_folder: /tmp/dashboards/flashcards/shared

configMapGenerator:
  - name: flashcards-system-overview-dashboard
    files:
      - system-overview-dashboard.json
  - name: flashcards-logs-overview-dashboard
    files:
      - logs-overview-dashboard.json
  - name: flashcards-slo-incident-dashboard
    files:
      - slo-incident-dashboard.json
