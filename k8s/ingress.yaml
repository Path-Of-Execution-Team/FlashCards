apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flashcards
spec:
  rules:
    - host: app.placeholder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    - host: api.placeholder.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
