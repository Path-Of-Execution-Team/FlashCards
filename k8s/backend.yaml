apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/service: "http://vault.vault.svc:8200"
        vault.hashicorp.com/role: REPLACE_ME
        vault.hashicorp.com/agent-inject-secret-backend-config.properties: REPLACE_ME
        vault.hashicorp.com/agent-inject-template-backend-config.properties: REPLACE_ME
        vault.hashicorp.com/agent-requests-cpu: "50m"
        vault.hashicorp.com/agent-requests-mem: "64Mi"
        vault.hashicorp.com/agent-limits-cpu: "150m"
        vault.hashicorp.com/agent-limits-mem: "128Mi"
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: backend-sa
      initContainers:
        - name: wait-for-vault
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          env:
            - name: VAULT_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: VAULT_ADDR
          command:
            - sh
            - -c
          args:
            - |
              echo "Waiting for Vault at ${VAULT_ADDR}/v1/sys/health..."
              until curl -sf "${VAULT_ADDR}/v1/sys/health" | grep '"sealed":false' >/dev/null; do
                echo "Vault not ready yet, sleeping 3s..."
                sleep 3
              done
              echo "Vault is ready."
      containers:
        - name: backend
          image: flashcards-backend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          env:
            - name: APP_NAME
              value: backend
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DOCKER_COMPOSE_ENABLED
              value: "false"
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: file:/vault/secrets/backend-config.properties
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_USERNAME
            - name: JWT_EXPIRATION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_EXPIRATION
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            - name: SPRING_KAFKA_CONSUMER_GROUP_ID
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_KAFKA_CONSUMER_GROUP_ID
            - name: SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET
            - name: SPRING_KAFKA_PRODUCER_ACKS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_KAFKA_PRODUCER_ACKS
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: BACKEND_ALLOWED_ORIGINS
            - name: LOKI_PUSH_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOKI_PUSH_URL
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
